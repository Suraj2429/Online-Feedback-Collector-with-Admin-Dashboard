    {% extends "layout.html" %}
    {% block content %}

    {% if success %}
    <div class="top-alert">
        Feedback submitted successfully!
    </div>
    {% endif %}

    <div class="page-header">
        <h2>Feedback Form</h2>
    </div>

    <div class="container">

        <div class="main-wrapper">

            <div class="left-section">
                <img src="{{ url_for('static', filename='images/feedback.jpg') }}">
            </div>

            <div class="right-section">
                <form action="/submit-feedback" method="POST" class="card">

                    <input type="text" name="name" class="form-control" placeholder="Name" required>

                    <input type="email" name="email" class="form-control" placeholder="Email" required>

                    <div class="rating-box">
                        <label><strong>Rate Us:</strong></label>
                        <div class="star-rating">
                            <input type="radio" name="rating" value="5" id="5"><label for="5">★</label>
                            <input type="radio" name="rating" value="4" id="4"><label for="4">★</label>
                            <input type="radio" name="rating" value="3" id="3"><label for="3">★</label>
                            <input type="radio" name="rating" value="2" id="2"><label for="2">★</label>
                            <input type="radio" name="rating" value="1" id="1" required><label for="1">★</label>
                        </div>
                    </div>

                    <textarea name="comments" class="form-control" placeholder="Comments"></textarea>

                    <button class="btn-primary">Submit Feedback</button>

                </form>
            </div>

        </div>

    </div>

    {% endblock %}
